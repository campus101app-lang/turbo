<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f0eb" />
    <meta
      name="description"
      content="Zap402 — USDC on Stellar. On-chain creator payouts: zaps, unlocks, clone."
    />
    <script>
    (function () {
      var t = localStorage.getItem("zap402-theme");
      if (t !== "light" && t !== "dark") t = "light";
      document.documentElement.setAttribute("data-theme", t);
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap"
      rel="stylesheet"
    >

    <!-- Option 3: Syne (geometric, bold) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:slnt,wght@-10..0,100..900&display=swap"
    >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
    >
    <title>Zap402</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
