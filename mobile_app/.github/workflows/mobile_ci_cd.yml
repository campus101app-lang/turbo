# Mobile App CI/CD Pipeline
name: Mobile App CI/CD

on:
  push:
    branches: [ main, develop ]
    paths: [ 'mobile_app/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'mobile_app/**' ]

env:
  FLUTTER_VERSION: '3.16.0'
  JAVA_VERSION: '17'

jobs:
  # Code Quality and Testing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          /opt/hostedtoolcache/flutter
          ~/.pub-cache
        key: ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}
        restore-keys: |
          ${{ runner.os }}-flutter-
          
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Get Flutter dependencies
      run: |
        cd mobile_app
        flutter pub get
        
    - name: Verify Flutter dependencies
      run: |
        cd mobile_app
        flutter pub deps --style=tree
        
    - name: Analyze code
      run: |
        cd mobile_app
        flutter analyze --fatal-infos --fatal-warnings
        
    - name: Run unit tests
      run: |
        cd mobile_app
        flutter test --coverage --reporter=json > test_report.json
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./mobile_app/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: mobile_app/test_report.json

  # Integration Tests
  integration-test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get Flutter dependencies
      run: |
        cd mobile_app
        flutter pub get
        
    - name: Setup Android emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        profile: pixel
        script: |
          cd mobile_app
          flutter test integration_test/ --verbose
          
    - name: Upload integration test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: mobile_app/test_report.json

  # Build Android APK
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get Flutter dependencies
      run: |
        cd mobile_app
        flutter pub get
        
    - name: Build APK
      run: |
        cd mobile_app
        flutter build apk --release --no-tree-shake-icons
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: android-apk
        path: mobile_app/build/app/outputs/flutter-apk/app-release.apk

  # Build iOS (only on main branch)
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [test, integration-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get Flutter dependencies
      run: |
        cd mobile_app
        flutter pub get
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Build iOS
      run: |
        cd mobile_app
        flutter build ios --release --no-codesign
        
    - name: Upload iOS build
      uses: actions/upload-artifact@v3
      with:
        name: ios-build
        path: mobile_app/build/ios/build/iphoneos/Runner.app

  # Performance Tests
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        
    - name: Get Flutter dependencies
      run: |
        cd mobile_app
        flutter pub get
        
    - name: Run performance tests
      run: |
        cd mobile_app
        flutter test test/performance/ --reporter=json > perf_report.json
        
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-results
        path: mobile_app/perf_report.json

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Deploy to Firebase App Distribution (Android)
  deploy-android:
    name: Deploy Android to Firebase
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download APK artifact
      uses: actions/download-artifact@v3
      with:
        name: android-apk
        path: mobile_app/build/app/outputs/flutter-apk/
        
    - name: Deploy to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        groups: testers
        file: mobile_app/build/app/outputs/flutter-apk/app-release.apk
        releaseNotes: |
          Version: ${{ github.sha }}
          Changes:
          - Latest changes from main branch
          - Bug fixes and improvements

  # Deploy to TestFlight (iOS)
  deploy-ios:
    name: Deploy iOS to TestFlight
    runs-on: macos-latest
    needs: [build-ios]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download iOS build
      uses: actions/download-artifact@v3
      with:
        name: ios-build
        path: mobile_app/build/ios/build/iphoneos/
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Install CocoaPods
      run: |
        cd mobile_app/ios
        pod install
        
    - name: Build and upload to TestFlight
      run: |
        cd mobile_app/ios
        xcodebuild -workspace Runner.xcworkspace \
          -scheme Runner \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath build/Runner.xcarchive \
          archive
        
        xcodebuild -exportArchive \
          -archivePath build/Runner.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath build/outputs
          
    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: mobile_app/ios/build/outputs/Runner.ipa
        apple-id: ${{ secrets.APPLE_ID }}
        issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
        key-id: ${{ secrets.APPLE_KEY_ID }}
        key: ${{ secrets.APPLE_KEY }}

  # Notify team of deployment
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-android, deploy-ios]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        text: |
          🚀 Mobile App Deployment Complete!
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Android: Deployed to Firebase App Distribution
          iOS: Deployed to TestFlight
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Create Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy-android, deploy-ios]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: DayFi Mobile App v${{ github.run_number }}
        body: |
          ## 🚀 DayFi Mobile App Release v${{ github.run_number }}
          
          ### 📱 Downloads
          - **Android**: Download from Firebase App Distribution
          - **iOS**: Download from TestFlight
          
          ### ✨ Features
          - Enterprise-grade UI/UX components
          - Business Intelligence Dashboard
          - Performance optimizations
          - Enhanced security features
          
          ### 🐛 Bug Fixes
          - Fixed navigation transitions
          - Improved error handling
          - Performance enhancements
          
          ### 🔧 Technical Details
          - Flutter ${{ env.FLUTTER_VERSION }}
          - Java ${{ env.JAVA_VERSION }}
          - Comprehensive test coverage
          - CI/CD pipeline integration
          
        draft: false
        prerelease: false
